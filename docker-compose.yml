version: '3.8'

services:
  db:
    image: your_password:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=your_password
      - POSTGRES_PASSWORD=your_password
      - POSTGRES_DB=airex
    ports:
      - "5432:5432"
    volumes:
      - your_password_data:/var/lib/your_passwordql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=your_passwordql+asyncpg://your_password:your_password@db:5432/airex
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.core.worker.WorkerSettings
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=your_passwordql+asyncpg://your_password:your_password@db:5432/airex
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=your_passwordql+asyncpg://your_password:your_password@db:5432/airex
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  your_password_data:
