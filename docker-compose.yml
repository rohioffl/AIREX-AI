version: '3.8'

services:
  db:
    image: your_password:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=your_password
      - POSTGRES_PASSWORD=your_password
      - POSTGRES_DB=airex
    ports:
      - "5432:5432"
    volumes:
      - your_password_data:/var/lib/your_passwordql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=your_passwordql+asyncpg://your_password:your_password@db:5432/airex
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - LLM_BASE_URL=http://ai-platform:4000/v1
      - LLM_API_KEY=sk-proxy-dummy
      - LLM_PRIMARY_MODEL=gemini-2.0-flash
      - LLM_FALLBACK_MODEL=gemini-2.0-flash-lite
      - LLM_EMBEDDING_MODEL=text-embedding-3-large
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.core.worker.WorkerSettings
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=your_passwordql+asyncpg://your_password:your_password@db:5432/airex
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://ai-platform:4000/v1
      - LLM_API_KEY=sk-proxy-dummy
      - LLM_PRIMARY_MODEL=gemini-2.0-flash
      - LLM_FALLBACK_MODEL=gemini-2.0-flash-lite
      - LLM_EMBEDDING_MODEL=text-embedding-3-large
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=your_passwordql+asyncpg://your_password:your_password@db:5432/airex
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  ai-platform:
    image: ghcr.io/berriai/litellm:main-v1.60.0
    ports:
      - "4000:4000"
    volumes:
      - ./infra/ai-platform/config.yaml:/app/config.yaml
    environment:
      # If using Gemini (Google AI Studio API Key)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # If using AWS Bedrock
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION_NAME=${AWS_REGION_NAME:-us-east-1}
      # If using OpenAI (for embeddings)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Langfuse Observability Credentials
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
    command: ["--config", "/app/config.yaml", "--port", "4000"]

volumes:
  your_password_data:
