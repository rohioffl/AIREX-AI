services:
  db:
    image: ankane/pgvector:latest
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-your_password}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_password}
      - POSTGRES_DB=${POSTGRES_DB:-airex}
    ports:
      - "5432:5432"
    volumes:
      - your_password_data:/var/lib/your_passwordql/data
      - ./database/scripts/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
      target: api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-your_passwordql+asyncpg://your_password:your_password@db:5432/airex}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - LLM_BASE_URL=http://ai-platform:4000/v1
      - LLM_API_KEY=sk-proxy-dummy
      - LLM_PRIMARY_MODEL=gemini-2.0-flash
      - LLM_FALLBACK_MODEL=nova-lite
      - LLM_EMBEDDING_MODEL=text-embedding
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-platform:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
      target: worker
    command: arq app.core.worker.WorkerSettings
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL:-your_passwordql+asyncpg://your_password:your_password@db:5432/airex}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_BASE_URL=http://ai-platform:4000/v1
      - LLM_API_KEY=sk-proxy-dummy
      - LLM_PRIMARY_MODEL=gemini-2.0-flash
      - LLM_FALLBACK_MODEL=nova-lite
      - LLM_EMBEDDING_MODEL=text-embedding
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-platform:
        condition: service_started

  migrate:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
      target: api
    command: bash -c "cd /database && alembic upgrade head"
    volumes:
      - ./backend:/app
      - ./database:/database
    environment:
      - DATABASE_URL=${DATABASE_URL:-your_passwordql+asyncpg://your_password:your_password@db:5432/airex}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: services/airex-frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  ai-platform:
    image: ghcr.io/berriai/litellm:main-v1.60.0
    ports:
      - "4000:4000"
    volumes:
      - ./infra/ai-platform/config.yaml:/app/config.yaml
    environment:
      # If using Gemini (Google AI Studio API Key)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # If using AWS Bedrock
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION_NAME=${AWS_REGION_NAME:-us-east-1}
      # If using OpenAI (for embeddings)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Langfuse Observability Credentials
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alerting_rules.yml:/etc/prometheus/alerting_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/airex-dashboard.json:/etc/grafana/provisioning/dashboards/airex.json
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      - backend

volumes:
  your_password_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
