version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    ECS_CLUSTER: airex-prod-cluster
    ECS_SERVICE_WORKER: airex-prod-worker

phases:
  install:
    commands:
      - python3 -m pip install --upgrade pip
  build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - |
          if [ -f image-detail-worker.json ]; then
            IMAGE_TAG=$(python3 -c 'import json; print(json.load(open("image-detail-worker.json"))["imageTag"])')
          else
            IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION}
          fi
      - ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - WORKER_IMAGE=$ECR_REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG
      - OUT_DIR=deployment/ecs/.rendered-task-definitions
      - mkdir -p "$OUT_DIR"
      - |
          sed \
            -e "s|__AWS_REGION__|$AWS_REGION|g" \
            -e "s|__WORKER_IMAGE__|$WORKER_IMAGE|g" \
            -e "s|__EXECUTION_ROLE_ARN__|$EXECUTION_ROLE_ARN|g" \
            -e "s|__TASK_ROLE_ARN__|$TASK_ROLE_ARN|g" \
            -e "s|__TASKDEF_FAMILY_WORKER__|$TASKDEF_FAMILY_WORKER|g" \
            -e "s|__LOG_GROUP_WORKER__|$LOG_GROUP_WORKER|g" \
            -e "s|__SECRET_DATABASE_URL_ARN__|$SECRET_DATABASE_URL_ARN|g" \
            -e "s|__SECRET_REDIS_URL_ARN__|$SECRET_REDIS_URL_ARN|g" \
            -e "s|__SECRET_LITELLM_MASTER_KEY_ARN__|$SECRET_LITELLM_MASTER_KEY_ARN|g" \
            -e "s|__SECRET_SITE24X7_CLIENT_SECRET_ARN__|$SECRET_SITE24X7_CLIENT_SECRET_ARN|g" \
            -e "s|__SECRET_SITE24X7_REFRESH_TOKEN_ARN__|$SECRET_SITE24X7_REFRESH_TOKEN_ARN|g" \
            -e "s|__LLM_BASE_URL__|$LLM_BASE_URL|g" \
            -e "s|__LLM_PRIMARY_MODEL__|$LLM_PRIMARY_MODEL|g" \
            -e "s|__LLM_FALLBACK_MODEL__|$LLM_FALLBACK_MODEL|g" \
            -e "s|__LLM_EMBEDDING_MODEL__|$LLM_EMBEDDING_MODEL|g" \
            -e "s|__FRONTEND_URL__|$FRONTEND_URL|g" \
            -e "s|__SITE24X7_ENABLED__|$SITE24X7_ENABLED|g" \
            -e "s|__SITE24X7_CLIENT_ID__|$SITE24X7_CLIENT_ID|g" \
            -e "s|__SITE24X7_BASE_URL__|$SITE24X7_BASE_URL|g" \
            -e "s|__SITE24X7_ACCOUNTS_URL__|$SITE24X7_ACCOUNTS_URL|g" \
            -e "s|__EMAIL_FROM__|$EMAIL_FROM|g" \
            deployment/ecs/task-definitions/airex-worker.json > "$OUT_DIR/airex-worker.json"
      - WORKER_TASKDEF_ARN=$(aws ecs register-task-definition --cli-input-json "file://$OUT_DIR/airex-worker.json" --query 'taskDefinition.taskDefinitionArn' --output text)
      - aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_WORKER" --task-definition "$WORKER_TASKDEF_ARN" --force-new-deployment
