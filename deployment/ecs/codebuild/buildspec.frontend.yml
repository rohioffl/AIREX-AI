version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    # Optional override; if unset we default to "airex-prod-frontend-${ACCOUNT_ID}".
    FRONTEND_BUCKET: ""
    # Required: CloudFront distribution id for the frontend bucket.
    CLOUDFRONT_DISTRIBUTION_ID: REPLACE_ME
    # Secrets Manager secret id containing either a plain client id string, or a Google web credentials JSON.
    FRONTEND_GOOGLE_CLIENT_ID_SECRET_ID: /airex/prod/frontend/google_oauth_client_id

phases:
  install:
    runtime-versions:
      nodejs: 20
  build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - |
          if [ -z "${FRONTEND_BUCKET:-}" ]; then
            FRONTEND_BUCKET="airex-prod-frontend-${ACCOUNT_ID}"
          fi
      - |
          if [ ! -f apps/web/src/assets/land_final.jpg ]; then
            mkdir -p apps/web/src/assets
            aws s3 cp "s3://${FRONTEND_BUCKET}/assets/land_final.jpg" "apps/web/src/assets/land_final.jpg"
          fi
      - |
          export RAW_CLIENT_ID_SECRET=$(aws secretsmanager get-secret-value \
            --region "$AWS_REGION" \
            --secret-id "$FRONTEND_GOOGLE_CLIENT_ID_SECRET_ID" \
            --query SecretString \
            --output text)
          export VITE_GOOGLE_CLIENT_ID=$(printf '%s' "$RAW_CLIENT_ID_SECRET" | node - <<'EOF'
          const fs = require("fs");
          const raw = fs.readFileSync(0, "utf8").trim();
          try {
            const parsed = JSON.parse(raw);
            process.stdout.write(parsed?.web?.client_id || parsed?.client_id || raw);
          } catch {
            process.stdout.write(raw);
          }
          EOF
          )
      - npm ci --prefix apps/web
      - npm run build --prefix apps/web
  post_build:
    commands:
      - aws s3 sync apps/web/dist s3://$FRONTEND_BUCKET --delete
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"

cache:
  paths:
    - apps/web/node_modules/**/*
