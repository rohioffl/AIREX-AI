version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    ECR_API_REPO: airex-api
    ECR_WORKER_REPO: airex-worker
    ECR_LITELLM_REPO: airex-litellm

phases:
  pre_build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION}
  build:
    commands:
      - docker build -f services/airex-api/Dockerfile -t $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG .
      - docker build -f services/airex-worker/Dockerfile -t $ECR_REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG .
      - docker build -f services/litellm/Dockerfile -t $ECR_REGISTRY/$ECR_LITELLM_REPO:$IMAGE_TAG .
  post_build:
    commands:
      - docker push $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG
      - docker push $ECR_REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG
      - docker push $ECR_REGISTRY/$ECR_LITELLM_REPO:$IMAGE_TAG
      - printf '{"imageTag":"%s"}' "$IMAGE_TAG" > image-detail.json

artifacts:
  files:
    - image-detail.json
