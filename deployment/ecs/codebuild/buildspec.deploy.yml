version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    SKIP_LITELLM: "true"
    ECS_CLUSTER: airex-prod-cluster
    ECS_SERVICE_API: airex-prod-api
    ECS_SERVICE_WORKER: airex-prod-worker
    ECS_SERVICE_LITELLM: airex-prod-litellm
    ECS_SERVICE_LANGFUSE: airex-prod-langfuse

phases:
  install:
    commands:
      - chmod +x deployment/ecs/scripts/*.sh
      - python3 -m pip install --upgrade pip
      - python3 -m pip install -r services/airex-api/requirements.txt
  build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - |
          if [[ -f image-detail.json ]]; then
            IMAGE_TAG=$(python3 -c 'import json; print(json.load(open("image-detail.json"))["imageTag"])')
          else
            IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION}
          fi
      - ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - export API_IMAGE=$ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG
      - export WORKER_IMAGE=$ECR_REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG
      - echo "Rendering and registering task definitions"
      - ./deployment/ecs/scripts/render-task-defs.sh
      - ./deployment/ecs/scripts/register-task-defs.sh
      - echo "Running migrations"
      - cd database && alembic upgrade head && cd ..
      - echo "Updating ECS services"
      - ./deployment/ecs/scripts/deploy-services.sh
