model_list:
  # Primary model: Gemini 2.0 Flash via Google AI Studio API
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash

  # Fallback model: Amazon Nova Lite via AWS Bedrock
  - model_name: nova-lite
    litellm_params:
      model: bedrock/amazon.nova-lite-v1:0

  # Amazon Nova Pro (higher quality fallback)
  - model_name: nova-pro
    litellm_params:
      model: bedrock/amazon.nova-pro-v1:0

  # Embedding Model: Bedrock Titan Text Embeddings v2
  - model_name: text-embedding
    litellm_params:
      model: bedrock/amazon.titan-embed-text-v2:0

litellm_settings:
  # Disable callbacks that require external keys we don't have
  success_callback: []
  failure_callback: []
