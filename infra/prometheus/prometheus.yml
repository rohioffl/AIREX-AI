# AIREX Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alerting_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "airex-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "backend:8000"
    scrape_interval: 10s
