# AIREX Prometheus Alerting Rules
# Load in prometheus.yml: rule_files: ["alerting_rules.yml"]

groups:
  - name: airex_incident_pipeline
    interval: 30s
    rules:
      # ── Dead Letter Queue ──────────────────────────────────────
      - alert: DLQNotEmpty
        expr: airex_dlq_size > 0
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "Dead Letter Queue has {{ $value }} items"
          description: >
            Tenant {{ $labels.tenant_id }} has {{ $value }} failed tasks
            in the DLQ for over 5 minutes. Investigate failed tasks.
          runbook: "docs/runbooks/dlq_cleanup.md"

      - alert: DLQCritical
        expr: airex_dlq_size > 10
        for: 2m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "DLQ overflow: {{ $value }} items"
          description: >
            DLQ for tenant {{ $labels.tenant_id }} has {{ $value }} items.
            Pipeline may be stuck. Immediate investigation required.

      # ── Circuit Breaker ────────────────────────────────────────
      - alert: LLMCircuitBreakerOpen
        expr: airex_circuit_breaker_state == 1
        for: 1m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "LLM circuit breaker is OPEN"
          description: >
            The AI circuit breaker has tripped. All recommendation
            requests are failing over. Check LLM provider status.
          runbook: "docs/runbooks/circuit_breaker.md"

      # ── AI / LLM Failures ─────────────────────────────────────
      - alert: AIFailureRateHigh
        expr: >
          rate(airex_ai_failure_total[5m]) /
          (rate(airex_ai_request_total[5m]) + 0.001) > 0.3
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "AI failure rate above 30%"
          description: >
            More than 30% of AI recommendation requests are failing.
            Check LLM provider connectivity and quotas.

      - alert: AILatencyHigh
        expr: histogram_quantile(0.95, rate(airex_ai_request_duration_seconds_bucket[5m])) > 15
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "AI P95 latency above 15s"
          description: >
            AI recommendation generation is slow. Consider switching
            to fallback model or investigating provider issues.

      # ── Execution Failures ─────────────────────────────────────
      - alert: ExecutionFailureRate
        expr: >
          rate(airex_execution_total{status="failed"}[10m]) /
          (rate(airex_execution_total[10m]) + 0.001) > 0.2
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "Execution failure rate above 20%"
          description: >
            More than 20% of action executions are failing for
            action_type={{ $labels.action_type }}.

      # ── State Transition Anomalies ─────────────────────────────
      - alert: IncidentsStuckInvestigating
        expr: >
          count(airex_state_transition_total{to_state="INVESTIGATING"}) -
          count(airex_state_transition_total{from_state="INVESTIGATING"}) > 10
        for: 10m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "Many incidents stuck in INVESTIGATING"
          description: >
            There are more than 10 incidents that entered INVESTIGATING
            but haven't transitioned out. Investigation plugins may be hanging.

      - alert: IncidentCreationSpike
        expr: rate(airex_incident_created_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "Incident creation rate spike: {{ $value }}/s"
          description: >
            Incident creation rate is abnormally high. Possible alert storm
            or monitoring misconfiguration.

      # ── HTTP Errors ────────────────────────────────────────────
      - alert: HTTP5xxRate
        expr: >
          rate(airex_http_request_duration_seconds_count{status_code=~"5.."}[5m]) /
          (rate(airex_http_request_duration_seconds_count[5m]) + 0.001) > 0.05
        for: 5m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "HTTP 5xx error rate above 5%"
          description: >
            Backend is returning server errors at {{ $value | humanizePercentage }}.
            Check application logs for stack traces.

      - alert: HTTPLatencyHigh
        expr: >
          histogram_quantile(0.99, rate(airex_http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "HTTP P99 latency above 5s"
          description: >
            API endpoint latency is high on path={{ $labels.path }}.

      # ── Infrastructure ─────────────────────────────────────────
      - alert: ActiveIncidentsHigh
        expr: airex_active_incidents > 50
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "{{ $value }} active incidents"
          description: >
            Tenant {{ $labels.tenant_id }} has {{ $value }} active incidents.
            System may be overloaded or alerts are not being resolved.
