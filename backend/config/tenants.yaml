# ═══════════════════════════════════════════════════════════════════
#  AIREX Tenant Configuration
# ═══════════════════════════════════════════════════════════════════
#
#  Minimal config — just cloud, project_id, and escalation email.
#  AIREX auto-discovers zone, region, instance name, machine type
#  from the cloud APIs using the private IP in the webhook tags.
#
#  Webhook tags needed:  tenant:<name>,ip:<private-ip>
#  That's it. AIREX handles the rest.
#
#  Hot reload: POST /api/v1/tenants/reload
#
# ── SSH User Resolution (per-machine) ─────────────────────────
#
#  AIREX resolves the SSH username for each machine automatically:
#    1. Per-server ssh_user (servers[].ssh_user in this file)
#    2. Per-tenant ssh_user (top-level ssh_user in this file)
#    3. Cloud instance tag/label (ssh-user or ssh_user)
#    4. Cloud API auto-detection (GCP boot image / AWS AMI)
#    5. Global default (defaults.ssh_user, default: ubuntu)
#
#  You can also set ssh_user as a cloud instance tag/label:
#    GCP: gcloud compute instances add-labels VM --labels=ssh-user=wacko
#    AWS: aws ec2 create-tags --tags Key=ssh-user,Value=ubuntu
#
#
# ── GCP Authentication (pick ONE) ──────────────────────────────
#
#  Option 1: gcloud CLI (recommended for dev)
#    gcloud auth activate-service-account SA@PROJECT.iam.gserviceaccount.com \
#      --key-file=sa-key.json
#    # or
#    gcloud auth application-default login
#
#  Option 2: Environment variable
#    export GOOGLE_APPLICATION_CREDENTIALS=/path/to/sa-key.json
#
#  Option 3: Automatic (no config needed)
#    Running on GCE / GKE / Cloud Run → uses attached service account
#
#  Option 4: Explicit key per tenant (store in config/credentials/)
#    gcp:
#      service_account_key: "config/credentials/acme-corp-sa.json"
#
#  If ANY of Options 1-3 are set, leave service_account_key empty.
#
# ── AWS Authentication (pick ONE per tenant) ──────────────────
#
#  Option 1: Cross-account Role Assumption (recommended for multi-account)
#    aws:
#      account_id: "123456789012"
#      role_name: "AirexReadOnly"
#      external_id: "airex-xyz"       # optional, for cross-account trust
#    Or explicit ARN:
#      role_arn: "arn:aws:iam::123456789012:role/AirexReadOnly"
#
#  Option 2: Access Key + Secret Key (store in config/credentials/)
#    Create file:  config/credentials/client-aws.json
#      {"access_key_id": "AKIA...", "secret_access_key": "wJa..."}
#    Then set:
#      aws:
#        credentials_file: "config/credentials/client-aws.json"
#
#  Option 3: Instance role (recommended on EC2/ECS)
#    Attach IAM role to the AIREX host → automatic, no config needed
#
#  Option 4: AWS CLI profile
#    aws configure --profile my-profile
#    Then set profile: "my-profile" below
#
#  Option 5: Environment variables
#    export AWS_ACCESS_KEY_ID=xxx
#    export AWS_SECRET_ACCESS_KEY=xxx
#    export AWS_REGION=ap-south-1
#
# ═══════════════════════════════════════════════════════════════════

defaults:
  ssh_user: ubuntu
  ssh_port: 22
  investigation_timeout: 60
  log_lookback_minutes: 30

tenants:

  # ── GCP test client ────────────────────────────────────────────
  gcp-test-client:
    tenant_id: "a1b2c3d4-0000-0000-0000-000000000001"
    display_name: "GCP Test Client"
    cloud: gcp
    ssh_user: wacko                     # default for all GCP instances in this tenant
    gcp:
      project_id: "smartops-automation"
      service_account_key: "/home/ubuntu/AIREX/backend/config/credentials/smartops-automation.json"
    escalation_email: "sre-team@smart-ops.com"
    # Per-server ssh_user overrides (optional — auto-detected from GCP image if omitted)
    # servers:
    #   - name: "vm-prod-web-01"
    #     private_ip: "10.128.0.15"
    #     ssh_user: "wacko"             # explicit override
    #     role: web
    #   - name: "vm-prod-db-01"
    #     private_ip: "10.128.0.20"
    #     ssh_user: "admin"             # this machine runs Debian (different user)
    #     role: database

  # ── AWS test client ────────────────────────────────────────────
  aws-test-client:
    tenant_id: "b1b2c3d4-0000-0000-0000-000000000002"
    display_name: "AWS Test Client"
    cloud: aws
    ssh_user: ubuntu                    # default for all AWS instances in this tenant
    aws:
      credentials_file: "config/credentials/smart-ops.json"
    escalation_email: "sre-team@smart-ops.com"
    # Per-server ssh_user overrides (optional — auto-detected from AWS AMI if omitted)
    # servers:
    #   - name: "web-prod-01"
    #     instance_id: "i-0abc123def456"
    #     private_ip: "172.31.10.5"
    #     ssh_user: "ubuntu"            # Ubuntu AMI
    #     role: web
    #   - name: "api-prod-01"
    #     instance_id: "i-0def456ghi789"
    #     private_ip: "172.31.10.10"
    #     ssh_user: "ec2-user"          # Amazon Linux AMI
    #     role: api
